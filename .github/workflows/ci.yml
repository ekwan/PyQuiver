name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync environment (package + dev/pandas extras)
        run: uv sync --extra dev --extra pandas
      - name: Run tests with coverage
        run: |
          uv run --no-sync coverage run --source=pyquiver -m pytest -q
          uv run --no-sync coverage report -m

  build:
    name: build & check distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel and validate
        run: |
          uv build
          uvx twine check dist/*
