name: Publish to PyPI

# Publishes pyquiver-kie to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret is stored.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI project name: pyquiver-kie
#   Owner:             ekwan
#   Repository:        PyQuiver
#   Workflow name:     publish.yml
#   Environment:       pypi

on:
  release:
    types: [published]

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
